<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APK Login Calculator</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:320px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:2px solid #00eaff;
    background:transparent;
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#00eaff;
    color:black;
}

button:active{
    transform:scale(0.9);
}

/* Calculator */
.calculator{
    display:none;
}

.display{
    background:black;
    color:#00ffcc;
    padding:15px;
    font-size:22px;
    border-radius:10px;
    text-align:right;
    margin-bottom:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.grid button{
    height:55px;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginBox">
        <h2>APK Login</h2>
        <button id="login-btn">Login via Browser</button>

        <input type="text" id="code-input" placeholder="Enter Code">
        <button id="verify-code-btn">Verify Code</button>
    </div>

    <!-- CALCULATOR -->
    <div class="calculator" id="calcBox">
        <h3>Welcome User</h3>
        <div class="display" id="display">0</div>

        <div class="grid">
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('/')">/</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="press('*')">*</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('-')">-</button>

            <button onclick="press('0')">0</button>
            <button onclick="clearDisplay()">C</button>
            <button onclick="calculate()">=</button>
            <button onclick="press('+')">+</button>
        </div>
    </div>

</div>

<script>

// LOGIN BUTTON
document.getElementById('login-btn').addEventListener('click', () => {

    const tempCode = Math.floor(1000 + Math.random() * 9000);

    localStorage.setItem('auth_code', tempCode);

    // Simulate external browser open
    const authURL = 'https://isecureid.42web.io/?apk_code=' + tempCode
        + '&redirect_uri=' + encodeURIComponent('yourapp://callback');

    window.open(authURL, '_blank');

    alert("Code generated: " + tempCode + " (Demo ke liye show ho raha hai)");
});

// VERIFY CODE
document.getElementById('verify-code-btn').addEventListener('click', () => {

    const userCode = document.getElementById('code-input').value;
    const storedCode = localStorage.getItem('auth_code');

    if(userCode === storedCode){

        // Fake callback data (simulation)
        const userData = {
            username: "DemoUser",
            authId: "APK12345",
            token: "secure_token"
        };

        console.log('✅ APK authenticated:', userData);

        document.getElementById("loginBox").style.display="none";
        document.getElementById("calcBox").style.display="block";

    } else {
        alert('❌ Invalid code');
    }
});

// CALCULATOR
let display = document.getElementById("display");

function press(val){
    if(display.innerText==="0") display.innerText=val;
    else display.innerText+=val;
}

function clearDisplay(){
    display.innerText="0";
}

function calculate(){
    try{
        display.innerText = eval(display.innerText);
    }catch{
        display.innerText="Error";
    }
}

</script>

</body>
</html>
