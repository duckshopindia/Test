<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Calculator</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    width: 320px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 2px solid transparent;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 16px;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 2px solid #00f0ff;
    background: transparent;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #00f0ff;
    color: black;
}

button:active {
    transform: scale(0.9);
}

/* Calculator */
.calculator {
    display: none;
}

.display {
    width: 100%;
    height: 60px;
    background: black;
    color: #00ffcc;
    text-align: right;
    padding: 10px;
    font-size: 24px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.grid button {
    height: 60px;
    font-size: 18px;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div id="login">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Enter username">
        <button onclick="sendOTP()">Send OTP</button>

        <input type="text" id="otpInput" placeholder="Enter OTP">
        <button onclick="verifyOTP()">Verify</button>
    </div>

    <!-- CALCULATOR -->
    <div class="calculator" id="calc">
        <div class="display" id="display">0</div>

        <div class="grid">
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('/')">/</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="press('*')">*</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('-')">-</button>

            <button onclick="press('0')">0</button>
            <button onclick="clearDisplay()">C</button>
            <button onclick="calculate()">=</button>
            <button onclick="press('+')">+</button>
        </div>
    </div>

</div>

<script>

// API
const OTP_API = 'https://us-central1-iid-2026.cloudfunctions.net/sendOTP';
const API_KEY = 'isk_5LoLDxWLkZcHHb6ImcEGRWpagO03JYhc';

let generatedOTP = null;

// Send OTP
async function sendOTP() {
    const username = document.getElementById("username").value;

    const otp = Math.floor(100000 + Math.random() * 900000);
    generatedOTP = otp;

    const response = await fetch(OTP_API, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-API-Key': API_KEY
        },
        body: JSON.stringify({
            username: username,
            senderID: 'ISECUREID',
            fromName: 'Calculator App',
            subject: 'OTP',
            message: `Your OTP is ${otp}`,
            otp: otp.toString()
        })
    });

    const result = await response.json();

    if(result.success){
        alert("OTP Sent!");
        sessionStorage.setItem("otp", otp);
    } else {
        alert("Error sending OTP");
    }
}

// Verify OTP
function verifyOTP() {
    const entered = document.getElementById("otpInput").value;
    const stored = sessionStorage.getItem("otp");

    if(entered === stored){
        document.getElementById("login").style.display = "none";
        document.getElementById("calc").style.display = "block";
    } else {
        alert("Wrong OTP");
    }
}

// Calculator Logic
let display = document.getElementById("display");

function press(val){
    if(display.innerText === "0") display.innerText = val;
    else display.innerText += val;
}

function clearDisplay(){
    display.innerText = "0";
}

function calculate(){
    try{
        display.innerText = eval(display.innerText);
    } catch {
        display.innerText = "Error";
    }
}

</script>

</body>
</html>
