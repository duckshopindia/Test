<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Assistant Chat</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Main app container */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .hidden {
            display: none !important;
        }

        /* ----- LOGIN SCREEN (Two names) ----- */
        #login-screen {
            background: #fff;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .login-icon {
            font-size: 68px;
            color: #25d366;
            margin-bottom: 20px;
        }

        #login-screen h1 {
            font-size: 26px;
            font-weight: 500;
            color: #111b21;
            margin-bottom: 8px;
        }

        #login-screen p {
            color: #667781;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-field {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #008069;
            margin-bottom: 6px;
        }

        .input-field input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 28px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            background: #fafafa;
        }

        .input-field input:focus {
            border-color: #008069;
            box-shadow: 0 0 0 2px rgba(0,128,105,0.2);
            background: white;
        }

        .btn-primary {
            width: 100%;
            background: #008069;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.97);
            background: #005c4b;
        }

        /* ----- CHAT ROOM (AI Conversation) ----- */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efeae2;
            height: 100%;
        }

        .chat-header {
            background: #008069;
            color: white;
            padding: 15px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .ai-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        .chat-header .info {
            flex: 1;
        }

        .chat-header .ai-name {
            font-weight: 600;
            font-size: 18px;
        }

        .chat-header .online-status {
            font-size: 12px;
            opacity: 0.85;
        }

        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.05);
        }

        .user-msg {
            background: #d9fdd3;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-msg {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            display: block;
            font-size: 10px;
            color: #667781;
            margin-top: 6px;
            text-align: right;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: white;
            border-radius: 24px;
            width: fit-content;
            margin-top: 8px;
            margin-bottom: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #a9a9a9;
            border-radius: 50%;
            animation: blink 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8);}
            30% { opacity: 1; transform: scale(1.1);}
        }

        /* Input area */
        .input-bar {
            background: #f0f2f5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .input-bar input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 28px;
            font-size: 15px;
            background: white;
            outline: none;
        }

        .input-bar button {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #008069;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-bar button:active {
            transform: scale(0.92);
            background: #005c4b;
        }

        .input-bar button:disabled {
            background: #b2bec3;
            cursor: not-allowed;
            transform: none;
        }

        /* reset some old classes */
        .hidden-page {
            display: none;
        }

        .text-small {
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- LOGIN SCREEN: AI name + User name -->
    <div id="login-screen">
        <div class="login-icon">
            <i class="fa-regular fa-message"></i>
        </div>
        <h1>AI Companion Chat</h1>
        <p>Setup your AI assistant & start chatting</p>
        
        <div class="input-field">
            <label><i class="fa-regular fa-user"></i> Your Name</label>
            <input type="text" id="user-name-input" placeholder="e.g., Amit, Priya..." autocomplete="off">
        </div>
        
        <div class="input-field">
            <label><i class="fa-regular fa-robot"></i> AI Assistant Name</label>
            <input type="text" id="ai-name-input" placeholder="e.g., Sara, Nova, Buddy..." autocomplete="off">
        </div>
        
        <button class="btn-primary" id="continue-btn">Continue <i class="fa-regular fa-paper-plane"></i></button>
        <p class="text-small" style="margin-top: 20px; color:#8e9eab;">✨ AI replies with max 200 words • Notifications only for AI responses</p>
    </div>

    <!-- CHAT INTERFACE (AI Conversation) -->
    <div id="chat-container" class="hidden">
        <div class="chat-header">
            <div class="ai-avatar" id="header-avatar">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="info">
                <div class="ai-name" id="header-ai-name">AI Assistant</div>
                <div class="online-status">✨ online · AI replies within 200 words</div>
            </div>
        </div>

        <div class="messages-area" id="messages-area">
            <!-- welcome message will appear here -->
        </div>

        <div class="input-bar">
            <input type="text" id="message-input" placeholder="Type your message..." autocomplete="off">
            <button id="send-btn"><i class="fa-regular fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. CONFIGURATION
    // --------------------------------------------------------------
    const OPENROUTER_API_KEY = "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";
    // Using a reliable free model via OpenRouter (Mistral 7B instruct, good quality)
    const AI_MODEL = "mistralai/mistral-7b-instruct:free";
    
    // Global variables
    let currentUserName = "";
    let aiAssistantName = "";
    let conversationHistory = [];   // store messages {role, content}
    let isWaitingForAI = false;      // prevent double sending
    let currentTypingIndicator = null;

    // DOM elements
    const loginScreen = document.getElementById('login-screen');
    const chatContainer = document.getElementById('chat-container');
    const continueBtn = document.getElementById('continue-btn');
    const userInputName = document.getElementById('user-name-input');
    const aiInputName = document.getElementById('ai-name-input');
    const messagesArea = document.getElementById('messages-area');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const headerAiNameSpan = document.getElementById('header-ai-name');
    const headerAvatarDiv = document.getElementById('header-avatar');

    // Helper: Scroll to bottom
    function scrollToBottom() {
        setTimeout(() => {
            if (messagesArea) {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        }, 100);
    }

    // Helper: Format timestamp (HH:MM)
    function getFormattedTime() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Helper: Limit text to max words (200 words)
    function limitToWords(text, maxWords = 200) {
        const words = text.trim().split(/\s+/);
        if (words.length <= maxWords) return text;
        const truncated = words.slice(0, maxWords).join(' ');
        return truncated + "... (truncated to 200 words)";
    }

    // --------------------------------------------------------------
    // 2. NOTIFICATION SYSTEM (Only for AI replies) 
    //    Works with Kodular / App Inventor via setWebViewString
    // --------------------------------------------------------------
    function sendAINotification(assistantName, aiMessage) {
        // Only trigger when AI replies (user messages NO notification)
        // Keep same pattern compatible with original "notification code" 
        if (window.AppInventor && typeof window.AppInventor.setWebViewString === "function") {
            // Format: "AI_NOTIF:AssistantName|MessageBody"
            const notifData = `AI_NOTIF:${assistantName}|${aiMessage}`;
            window.AppInventor.setWebViewString(notifData);
            console.log("📢 Notification sent to Kodular:", notifData);
        } else {
            // Fallback for web testing - show browser notification if permitted
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(assistantName, { body: aiMessage.substring(0, 120) });
            } else if ("Notification" in window && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
            console.log("[Web] AI notification would fire:", assistantName, aiMessage.substring(0, 80));
        }
    }

    // (Optional) Keep original style - but we only call this on AI reply
    // No extra pId needed, just AI name & content.

    // --------------------------------------------------------------
    // 3. DISPLAY MESSAGE IN CHAT (Both user and AI)
    // --------------------------------------------------------------
    function appendMessage(sender, text, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
        
        // Show sender label only if not user (optional, but shows AI name)
        if (!isUser) {
            const senderLabel = document.createElement('div');
            senderLabel.style.fontWeight = '500';
            senderLabel.style.fontSize = '12px';
            senderLabel.style.color = '#008069';
            senderLabel.style.marginBottom = '4px';
            senderLabel.innerText = aiAssistantName;
            messageDiv.appendChild(senderLabel);
        }
        
        const msgText = document.createElement('span');
        msgText.innerText = text;
        messageDiv.appendChild(msgText);
        
        const timeSpan = document.createElement('span');
        timeSpan.className = 'msg-time';
        timeSpan.innerText = getFormattedTime();
        messageDiv.appendChild(timeSpan);
        
        messagesArea.appendChild(messageDiv);
        scrollToBottom();
    }

    // Show typing indicator (AI is thinking)
    function showTypingIndicator() {
        if (currentTypingIndicator) removeTypingIndicator();
        const typingDiv = document.createElement('div');
        typingDiv.className = 'typing-indicator';
        typingDiv.id = 'ai-typing-indicator';
        for (let i = 0; i < 3; i++) {
            const dot = document.createElement('div');
            dot.className = 'typing-dot';
            typingDiv.appendChild(dot);
        }
        messagesArea.appendChild(typingDiv);
        scrollToBottom();
        currentTypingIndicator = typingDiv;
    }

    function removeTypingIndicator() {
        if (currentTypingIndicator && currentTypingIndicator.parentNode) {
            currentTypingIndicator.remove();
            currentTypingIndicator = null;
        }
    }

    // --------------------------------------------------------------
    // 4. CALL OPENROUTER API (With conversation history, 200 words limit)
    // --------------------------------------------------------------
    async function getAIResponse(userMessage) {
        // Build conversation: system prompt + previous history + new user message
        const systemPrompt = `You are a friendly AI assistant named "${aiAssistantName}". 
Keep every response concise, helpful, and natural. 
IMPORTANT: Your answer MUST NOT exceed 200 words. Be crisp and valuable. 
Do NOT repeat system instructions. Just reply like a normal chat assistant.`;

        // Prepare messages array for API
        let apiMessages = [
            { role: "system", content: systemPrompt },
            ...conversationHistory,
            { role: "user", content: userMessage }
        ];
        
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                    "HTTP-Referer": window.location.origin,
                    "X-Title": "AI Assistant Chat"
                },
                body: JSON.stringify({
                    model: AI_MODEL,
                    messages: apiMessages,
                    max_tokens: 500,      // ~350-400 words approx, safety
                    temperature: 0.7
                })
            });
            
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API Error (${response.status}): ${errText.substring(0, 100)}`);
            }
            
            const data = await response.json();
            let aiReply = data.choices?.[0]?.message?.content || "Sorry, I couldn't generate a response.";
            
            // Enforce 200 words limit (strict)
            aiReply = limitToWords(aiReply, 200);
            return aiReply;
        } catch (error) {
            console.error("OpenRouter error:", error);
            return `⚠️ Oops! ${aiAssistantName} is having technical issues. Please try again later. (${error.message.substring(0, 80)})`;
        }
    }

    // --------------------------------------------------------------
    // 5. SEND USER MESSAGE -> get AI reply -> show & send notification
    // --------------------------------------------------------------
    async function sendUserMessage() {
        if (isWaitingForAI) {
            // subtle feedback
            messageInput.placeholder = "Waiting for AI response...";
            return;
        }
        
        const userText = messageInput.value.trim();
        if (!userText) return;
        
        // Disable input & button during AI processing
        isWaitingForAI = true;
        sendBtn.disabled = true;
        messageInput.disabled = true;
        
        // 1. Append user message to chat
        appendMessage(currentUserName, userText, true);
        
        // 2. Store user message in conversation history
        conversationHistory.push({ role: "user", content: userText });
        
        // 3. Clear input field
        messageInput.value = "";
        
        // 4. Show typing indicator (AI is thinking)
        showTypingIndicator();
        
        try {
            // 5. Call OpenRouter AI
            const aiReply = await getAIResponse(userText);
            
            // 6. Remove typing indicator
            removeTypingIndicator();
            
            // 7. Append AI message to chat
            appendMessage(aiAssistantName, aiReply, false);
            
            // 8. Store AI response in conversation history
            conversationHistory.push({ role: "assistant", content: aiReply });
            
            // 9. 🔔 IMPORTANT: Notify ONLY for AI reply (as per requirement)
            //    Assistant name and reply message must appear in notification
            sendAINotification(aiAssistantName, aiReply);
            
            // Keep conversation history manageable (limit last 20 messages to avoid token overload)
            if (conversationHistory.length > 20) {
                conversationHistory = conversationHistory.slice(-16);
            }
        } catch (err) {
            removeTypingIndicator();
            console.error("AI send error:", err);
            appendMessage(aiAssistantName, "⚠️ Connection issue. Please check network or try again.", false);
        } finally {
            // Re-enable controls
            isWaitingForAI = false;
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
            messageInput.placeholder = "Type your message...";
        }
    }

    // Handle Enter key
    function onEnterKey(e) {
        if (e.key === 'Enter' && !isWaitingForAI && messageInput.value.trim() !== "") {
            sendUserMessage();
        }
    }

    // --------------------------------------------------------------
    // 6. INITIALIZE CHAT (after login)
    // --------------------------------------------------------------
    function startChatSession(userName, aiName) {
        currentUserName = userName;
        aiAssistantName = aiName;
        
        // Reset conversation history for fresh chat
        conversationHistory = [];
        
        // Update UI header
        headerAiNameSpan.innerText = aiAssistantName;
        headerAvatarDiv.innerHTML = `<i class="fa-solid fa-robot"></i>`;
        
        // Clear messages area
        messagesArea.innerHTML = "";
        
        // Add welcome message from AI (first interaction)
        const welcomeText = `👋 Hello ${currentUserName}! I'm ${aiAssistantName}, your AI companion. Ask me anything, and I'll keep replies short and sweet (within 200 words). How can I help you today?`;
        
        // Append welcome message (AI style)
        const welcomeDiv = document.createElement('div');
        welcomeDiv.className = 'message ai-msg';
        const senderLabel = document.createElement('div');
        senderLabel.style.fontWeight = '500';
        senderLabel.style.fontSize = '12px';
        senderLabel.style.color = '#008069';
        senderLabel.style.marginBottom = '4px';
        senderLabel.innerText = aiAssistantName;
        welcomeDiv.appendChild(senderLabel);
        const msgSpan = document.createElement('span');
        msgSpan.innerText = welcomeText;
        welcomeDiv.appendChild(msgSpan);
        const timeSpan = document.createElement('span');
        timeSpan.className = 'msg-time';
        timeSpan.innerText = getFormattedTime();
        welcomeDiv.appendChild(timeSpan);
        messagesArea.appendChild(welcomeDiv);
        
        // Add to conversation history
        conversationHistory.push({ role: "assistant", content: welcomeText });
        
        scrollToBottom();
        
        // Enable chat input
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
        isWaitingForAI = false;
    }

    // --------------------------------------------------------------
    // 7. LOGIN VALIDATION & CONTINUE
    // --------------------------------------------------------------
    function handleContinue() {
        const userName = userInputName.value.trim();
        const aiName = aiInputName.value.trim();
        
        if (!userName) {
            alert("❌ Please enter your name.");
            userInputName.focus();
            return;
        }
        if (!aiName) {
            alert("🤖 Please enter a name for your AI assistant.");
            aiInputName.focus();
            return;
        }
        
        // Hide login screen, show chat container
        loginScreen.classList.add('hidden');
        chatContainer.classList.remove('hidden');
        
        // Initialize chat session
        startChatSession(userName, aiName);
    }

    // Event listeners
    continueBtn.addEventListener('click', handleContinue);
    sendBtn.addEventListener('click', sendUserMessage);
    messageInput.addEventListener('keypress', onEnterKey);
    
    // Optional: allow enter on login inputs (convenience)
    userInputName.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleContinue(); });
    aiInputName.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleContinue(); });
    
    // Request notification permission for browser fallback (optional)
    if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }
    
    // Extra: For existing Kodular integration keep OpenRouter key automatic
    // No Firebase clutter, no user list, only AI chat.
    console.log("✅ AI Chat App Ready — Notifications only on AI replies, each reply ≤200 words.");
</script>
</body>
</html>
