<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone Test</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #ece5dd; }
        .hidden { display: none; }
        /* Login Screen */
        #login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #075e54; color: white; }
        input { padding: 12px; border-radius: 5px; border: none; margin: 10px; width: 80%; }
        button { padding: 12px 30px; background: #25d366; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        /* Dashboard */
        #dashboard { background: white; height: 100vh; }
        .header { background: #075e54; color: white; padding: 15px; font-size: 20px; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: block; }
        .user-item:hover { background: #f5f5f5; }
        /* Chat Room */
        #chat-room { display: flex; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; margin: 5px; border-radius: 8px; max-width: 70%; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: white; align-self: flex-start; }
        .input-area { padding: 10px; background: #f0f0f0; display: flex; }
    </style>
</head>
<body>

    <div id="login-page">
        <h1>WhatsApp Test</h1>
        <input type="text" id="username" placeholder="Apna Naam Likhein...">
        <button onclick="login()">Continue</button>
    </div>

    <div id="dashboard" class="hidden">
        <div class="header">Chats</div>
        <div id="user-list">
            <p style="padding: 20px;">Users load ho rahe hain...</p>
        </div>
    </div>

    <div id="chat-room" class="hidden">
        <div class="header">
            <span onclick="showDashboard()" style="cursor:pointer;">←</span> 
            <span id="chatting-with">Username</span>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAdZb8GbRCLr0a-eQSl1QEQ8SuOmKQf1So",
            authDomain: "iid-2026.firebaseapp.com",
            databaseURL: "https://iid-2026-default-rtdb.firebaseio.com",
            projectId: "iid-2026",
            storageBucket: "iid-2026.firebasestorage.app",
            messagingSenderId: "96823275377",
            appId: "1:96823275377:web:95460e19e1002dca9a50d0",
            measurementId: "G-711HPBRLNV"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = "";
        let targetUser = "";
        let targetPlayerId = "";
        let myPlayerId = "";

        // Kodular se Player ID lena
        setInterval(() => {
            if (window.AppInventor) {
                let val = window.AppInventor.getWebViewString();
                if (val && val.includes("player_id:")) {
                    myPlayerId = val.split(":")[1];
                    if(currentUser) {
                        db.ref('users/' + currentUser).update({ onesignal_id: myPlayerId });
                    }
                }
            }
        }, 3000);

        // LOGIN FUNCTION
        function login() {
            currentUser = document.getElementById('username').value.trim();
            if (!currentUser) return alert("Naam daaliye!");
            
            // Firebase mein user register/update karein
            db.ref('users/' + currentUser).update({
                name: currentUser,
                lastSeen: Date.now(),
                onesignal_id: myPlayerId || "not_set"
            });

            document.getElementById('login-page').classList.add('hidden');
            showDashboard();
        }

        // DASHBOARD SHOW KARNA
        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('chat-room').classList.add('hidden');
            loadUsers();
        }

        function loadUsers() {
            db.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                let html = "";
                for (let id in users) {
                    if (id !== currentUser) {
                        html += `<div class="user-item" onclick="startChat('${id}', '${users[id].onesignal_id}')">${id}</div>`;
                    }
                }
                document.getElementById('user-list').innerHTML = html || "Koi dusra user online nahi hai";
            });
        }

        // CHAT START KARNA
        function startChat(id, pId) {
            targetUser = id;
            targetPlayerId = pId;
            document.getElementById('chatting-with').innerText = id;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('chat-room').classList.remove('hidden');
            loadMessages();
        }

        // MESSAGE BHEJNA
        function sendMessage() {
            let text = document.getElementById('msgInput').value;
            if (!text) return;

            let chatId = [currentUser, targetUser].sort().join("_");
            db.ref('chats/' + chatId).push({
                sender: currentUser,
                text: text,
                time: Date.now()
            });

            // Notification bhejna
            if (targetPlayerId && targetPlayerId !== "not_set") {
                sendNotification(targetPlayerId, text);
            }

            document.getElementById('msgInput').value = "";
        }

        // ONE SIGNAL NOTIFICATION API
        function sendNotification(pId, msg) {
            fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Basic os_v2_app_t47yuqe4q5fgrpesmxre4khscgc7mwxkcdzuu7nlqhrrpmyphu42ryy4rpqxfoxkeixwzk3t5774y22b4op2u6guvolj2kuum5uwjdi"
                },
                body: JSON.stringify({
                    app_id: "9f3f8a40-9c87-4a68-bc92-65e24e28f211",
                    include_player_ids: [pId],
                    contents: {"en": msg},
                    headings: {"en": "New Message from " + currentUser}
                })
            });
        }

        // MESSAGES LOAD KARNA (Realtime)
        function loadMessages() {
            let chatId = [currentUser, targetUser].sort().join("_");
            db.ref('chats/' + chatId).on('value', (snapshot) => {
                let msgs = snapshot.val();
                let html = "";
                for (let m in msgs) {
                    let type = msgs[m].sender === currentUser ? "sent" : "received";
                    html += `<div class="msg ${type}">${msgs[m].text}</div>`;
                }
                let container = document.getElementById('messages');
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
        }
    </script>
</body>
</html>
