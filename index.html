<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatzeno Gallery Test</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }
        .gallery-btn {
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #status {
            margin-top: 20px;
            color: #555;
        }
    </style>
</head>
<body>

    <button class="gallery-btn" onclick="openGallery()">
        Open Gallery
    </button>

    <div id="status">Button click karo test karne ke liye</div>

    <script>
        function openGallery() {
            // Ye line Kodular ke 'WebViewStringChange' ko signal bhejti hai
            if (window.AppInventory) {
                window.AppInventory.setWebViewString("OPEN_GALLERY");
                document.getElementById('status').innerText = "Signal bhej diya: OPEN_GALLERY";
            } else {
                document.getElementById('status').innerText = "Error: AppInventory nahi mila!";
            }
        }
    </script>

</body>
</html>
