<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Calculator</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container {
    width:320px;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    text-align:center;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:2px solid #00eaff;
    background:transparent;
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover {
    background:#00eaff;
    color:black;
}

button:active {
    transform:scale(0.9);
}

/* Calculator */
.calculator {
    display:none;
}

.display {
    background:black;
    color:#00ffcc;
    padding:15px;
    font-size:22px;
    border-radius:10px;
    text-align:right;
    margin-bottom:10px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.grid button {
    height:55px;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGIN SCREEN -->
    <div id="loginBox">
        <h2>Secure Login</h2>
        <p>Login via iSecureID</p>
        <button onclick="login()">Login</button>
    </div>

    <!-- CALCULATOR -->
    <div class="calculator" id="calcBox">
        <h3 id="welcome"></h3>
        <div class="display" id="display">0</div>

        <div class="grid">
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('/')">/</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="press('*')">*</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('-')">-</button>

            <button onclick="press('0')">0</button>
            <button onclick="clearDisplay()">C</button>
            <button onclick="calculate()">=</button>
            <button onclick="press('+')">+</button>
        </div>
    </div>

</div>

<script>

// LOGIN REDIRECT
function login(){
    const authURL = 'https://isecureid.42web.io/?redirect_uri=' 
        + encodeURIComponent(window.location.href);
    window.location.href = authURL;
}

// HANDLE CALLBACK
function checkLogin(){
    const params = new URLSearchParams(window.location.search);

    if(params.get('token')){
        const user = {
            token: params.get('token'),
            username: params.get('username'),
            authId: params.get('auth_id'),
            email: params.get('email')
        };

        console.log('✅ User logged in:', user);

        // Save session
        localStorage.setItem("user", JSON.stringify(user));

        showCalculator(user);
    } else {
        // check if already logged in
        const savedUser = localStorage.getItem("user");
        if(savedUser){
            showCalculator(JSON.parse(savedUser));
        }
    }
}

// SHOW CALCULATOR
function showCalculator(user){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("calcBox").style.display="block";
    document.getElementById("welcome").innerText = "Hi, " + user.username;
}

// CALCULATOR LOGIC
let display = document.getElementById("display");

function press(val){
    if(display.innerText==="0") display.innerText=val;
    else display.innerText+=val;
}

function clearDisplay(){
    display.innerText="0";
}

function calculate(){
    try{
        display.innerText = eval(display.innerText);
    } catch {
        display.innerText="Error";
    }
}

// INIT
checkLogin();

</script>

</body>
</html>
