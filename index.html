<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening App...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 max-w-md w-full text-center">
        <div class="mb-6">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Authentication Successful!</h1>
            <p class="text-gray-600 mb-6">Click the button below to open your app</p>
        </div>

        <button id="openAppBtn" class="w-full bg-indigo-600 text-white font-bold py-4 px-6 rounded-lg hover:bg-indigo-700 transition shadow-lg mb-4">
            📱 Open App
        </button>

        <div class="bg-gray-50 rounded-lg p-4 mb-4">
            <p class="text-xs text-gray-600 mb-2"><strong>App not opening?</strong></p>
            <button id="copyDataBtn" class="text-xs bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">
                Copy Authentication Data
            </button>
        </div>

        <p class="text-xs text-gray-400">
            You can close this page after opening the app
        </p>
    </div>

    <script>
        // Get params from URL
        const urlParams = new URLSearchParams(window.location.search);
        const packageName = urlParams.get('package_name');
        const token = urlParams.get('token');
        const username = urlParams.get('username');
        const authId = urlParams.get('auth_id');
        const email = urlParams.get('email');

        const deepLinkUrl = `${packageName}://auth?token=${encodeURIComponent(token)}&username=${encodeURIComponent(username)}&auth_id=${encodeURIComponent(authId)}&email=${encodeURIComponent(email)}`;

        // Open app on button click
        document.getElementById('openAppBtn').addEventListener('click', () => {
            window.location.href = deepLinkUrl;
            
            // Show success message
            setTimeout(() => {
                document.getElementById('openAppBtn').innerHTML = '✅ App Opening...';
                document.getElementById('openAppBtn').disabled = true;
            }, 100);
        });

        // Copy data fallback
        document.getElementById('copyDataBtn').addEventListener('click', () => {
            const authData = {
                token: token,
                username: username,
                auth_id: authId,
                email: email
            };
            
            navigator.clipboard.writeText(JSON.stringify(authData, null, 2)).then(() => {
                alert('✅ Authentication data copied!\n\nOpen your app and paste the data manually.');
            });
        });

        // Auto-attempt after 2 seconds (optional)
        setTimeout(() => {
            console.log('Auto-attempting to open app...');
            // Uncomment below line if you want auto-attempt
            // window.location.href = deepLinkUrl;
        }, 2000);
    </script>
</body>
</html>
