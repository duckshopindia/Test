<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Location App</title>
    <style>
        /* Styling wahi rakhi hai jo pehle thi */
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        button { width: 100%; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        .gps-btn { background-color: #ff9800; }
        .location-btn { background-color: #007bff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📍 Find My Location</h1>
        <p>GPS ON karne ke liye niche button dabayein.</p>
        
        <button class="gps-btn" onclick="triggerLocationSettings()">
            ⚙️ Enable GPS / Location
        </button>

        <button class="location-btn" id="getLocationBtn">
            🌍 Get Current Location
        </button>
    </div>

    <script>
        function triggerLocationSettings() {
            // Hum direct window.AppInventor use karne se pehle check kar rahe hain
            try {
                if (window.AppInventor && window.AppInventor.setWebViewString) {
                    // Pehle string khali karte hain phir bhejte hain taaki har baar trigger ho
                    window.AppInventor.setWebViewString(''); 
                    window.AppInventor.setWebViewString('open_location');
                } else {
                    console.log("Kodular Interface nahi mila.");
                    alert("App ke andar hi try karein.");
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        // Baki geolocation code wahi rahega...
    </script>
</body>
</html>
