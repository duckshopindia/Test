<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Assistant Chat</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #e9ecef;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* App container - mobile first */
        .app-wrapper {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #ffffff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            border-radius: 0;
            overflow: hidden;
        }

        /* Hide utility */
        .hidden {
            display: none !important;
        }

        /* ----- LOGIN SCREEN ----- */
        .login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 28px 24px;
            background: white;
            text-align: center;
        }

        .login-icon {
            font-size: 68px;
            color: #25D366;
            margin-bottom: 24px;
            background: #e9f5ee;
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
        }

        .login-screen h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #111b21;
        }

        .login-sub {
            font-size: 14px;
            color: #5e6f8d;
            margin-bottom: 32px;
        }

        .input-field {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-field label {
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
            display: block;
        }

        .input-field input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            background: #fafcff;
        }

        .input-field input:focus {
            outline: none;
            border-color: #008069;
            box-shadow: 0 0 0 3px rgba(0,128,105,0.15);
        }

        .btn-primary {
            background: #008069;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.97);
            background: #005c4b;
        }

        /* ----- CHAT SCREEN HEADER ----- */
        .chat-header {
            background: #008069;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 5;
        }

        .back-logout {
            background: rgba(255,255,255,0.2);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

        .back-logout i {
            font-size: 18px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-info h3 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .chat-header-info p {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 2px;
        }

        .ai-badge {
            background: #25D366;
            padding: 6px 10px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }

        /* MESSAGES AREA */
        .messages-container {
            flex: 1;
            background: #efeae2;
            overflow-y: auto;
            padding: 20px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 82%;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.45;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.05);
        }

        .user-message {
            background: #d9fdd3;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #111b21;
        }

        .ai-message {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #111b21;
        }

        .msg-time {
            font-size: 10px;
            color: #667781;
            margin-top: 5px;
            text-align: right;
            display: block;
        }

        .ai-extra-actions {
            margin-top: 6px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .notif-manual-btn {
            background: #eef2ff;
            border: none;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 500;
            color: #0a5c4e;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .notif-manual-btn i {
            font-size: 12px;
        }

        .typing-indicator {
            background: white;
            border-radius: 18px;
            padding: 12px 18px;
            align-self: flex-start;
            font-size: 13px;
            color: #54656f;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #008069;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0);}
            30% { opacity: 1; transform: translateY(-3px);}
        }

        /* INPUT AREA */
        .input-area {
            background: #f0f2f5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #e2e8f0;
        }

        .input-area input {
            flex: 1;
            border: none;
            background: white;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .send-btn {
            background: #008069;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn:active {
            transform: scale(0.94);
            background: #005c4b;
        }

        .send-btn.disabled {
            opacity: 0.6;
            pointer-events: none;
        }

        .footer-note {
            font-size: 10px;
            text-align: center;
            background: #f0f2f5;
            padding: 6px;
            color: #667781;
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="appRoot">
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="login-screen">
        <div class="login-icon">
            <i class="fa-regular fa-message"></i>
        </div>
        <h2>AI Chat Studio</h2>
        <div class="login-sub">Enter names to start conversation</div>

        <div class="input-field">
            <label><i class="fa-regular fa-user"></i> Your Name</label>
            <input type="text" id="userNameInput" placeholder="e.g., Rahul" autocomplete="off">
        </div>
        <div class="input-field">
            <label><i class="fa-regular fa-robot"></i> AI Assistant Name</label>
            <input type="text" id="aiNameInput" placeholder="e.g., Nova, Sage, Jarvis" autocomplete="off">
        </div>
        <button class="btn-primary" id="continueBtn">Continue →</button>
    </div>

    <!-- CHAT UI (HIDDEN INITIALLY) -->
    <div id="chatScreen" class="hidden" style="flex: 1; display: flex; flex-direction: column; height: 100%;">
        <div class="chat-header">
            <div class="back-logout" id="logoutBtn">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <div class="chat-header-info">
                <h3 id="chatAiName">AI Assistant</h3>
                <p><span id="chatUserNameDisplay"></span> • AI Chat</p>
            </div>
            <div class="ai-badge">
                <i class="fa-regular fa-star-of-life"></i> AI
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <!-- dynamic messages appear here -->
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
            <button class="send-btn" id="sendMsgBtn">
                <i class="fa-regular fa-paper-plane"></i>
            </button>
        </div>
        <div class="footer-note">
            <i class="fa-regular fa-bell"></i> AI replies → notification only
        </div>
    </div>
</div>

<script>
    // ----------------------------- CONFIGURATION ---------------------------------
    const OPENROUTER_API_KEY = "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";
    const MODEL = "inclusionai/ling-2.6-flash:free";
    const API_URL = "https://openrouter.ai/api/v1/chat/completions";

    // Global state
    let currentUserName = "";
    let currentAIName = "";
    let conversationHistory = [];   // store messages for context: {role, content}
    let isWaitingForAI = false;
    let autoNotificationPossible = false;   // will detect AppInventor

    // Detect automatic notification (Kodular / AppInventor bridge)
    function checkNotificationCapability() {
        // check if window.AppInventor and setWebViewString exists and works
        if (window.AppInventor && typeof window.AppInventor.setWebViewString === "function") {
            autoNotificationPossible = true;
            console.log("✅ Auto notification via AppInventor available");
        } else {
            autoNotificationPossible = false;
            console.log("⚠️ No AppInventor bridge, manual notification button will appear for AI replies");
        }
    }

    // Universal notification sender (preserving original system style)
    // This sends notif exactly as the old code: "SEND_NOTIF:name|message|target"
    // For AI notifications we send SEND_NOTIF:AI_Name|reply|SELF
    function sendNotificationViaBridge(title, messageBody, targetId = "SELF") {
        if (!window.AppInventor || typeof window.AppInventor.setWebViewString !== "function") {
            console.warn("AppInventor bridge missing, notification not sent automatically");
            return false;
        }
        try {
            // exactly same format as original code: SEND_NOTIF:Name|Message|Receiver
            const notifString = `SEND_NOTIF:${title}|${messageBody}|${targetId}`;
            window.AppInventor.setWebViewString(notifString);
            console.log("📢 Notification sent:", title);
            return true;
        } catch(e) {
            console.error("Notification error:", e);
            return false;
        }
    }

    // Trigger AI notification (should only be called when AI replies)
    function triggerAINotification(aiReplyText) {
        if (!currentAIName) return;
        // trim message to avoid huge
        let shortMessage = aiReplyText.length > 180 ? aiReplyText.substring(0, 180) + "..." : aiReplyText;
        const success = sendNotificationViaBridge(currentAIName, shortMessage, "SELF");
        if (!success && !autoNotificationPossible) {
            // will be handled by manual fallback button
            console.log("Auto notif failed, manual fallback ready");
        }
        return success;
    }

    // Helper: truncate to 200 words maximum (if API returns oversize)
    function enforceWordLimit(text, maxWords = 200) {
        const words = text.split(/\s+/);
        if (words.length <= maxWords) return text;
        return words.slice(0, maxWords).join(" ") + "...";
    }

    // Add message to UI and store history
    function addMessageToUI(role, displayName, content, timestamp = null) {
        const container = document.getElementById("messagesContainer");
        const msgDiv = document.createElement("div");
        const time = timestamp || new Date();
        const formattedTime = `${time.getHours().toString().padStart(2,'0')}:${time.getMinutes().toString().padStart(2,'0')}`;
        
        const isUser = (role === "user");
        msgDiv.className = `message ${isUser ? "user-message" : "ai-message"}`;
        
        let innerHtml = `<div>${escapeHtml(content)}</div><span class="msg-time">${formattedTime}</span>`;
        
        // For AI messages, if auto notification NOT possible, show manual notify button (unique per message)
        if (!isUser && !autoNotificationPossible && currentAIName) {
            innerHtml += `<div class="ai-extra-actions">
                            <button class="notif-manual-btn" data-ai-reply="${escapeHtml(content)}" data-ai-name="${escapeHtml(currentAIName)}">
                                <i class="fa-regular fa-bell"></i> Send Notification
                            </button>
                          </div>`;
        }
        msgDiv.innerHTML = innerHtml;
        container.appendChild(msgDiv);
        
        // add event listeners for manual buttons after appended
        if (!isUser && !autoNotificationPossible) {
            const btn = msgDiv.querySelector(".notif-manual-btn");
            if (btn) {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const replyText = btn.getAttribute("data-ai-reply");
                    const aiTitle = btn.getAttribute("data-ai-name");
                    if (replyText && aiTitle) {
                        sendNotificationViaBridge(aiTitle, replyText.length > 180 ? replyText.substring(0,180)+"..." : replyText, "SELF");
                        // optional visual feedback
                        btn.innerHTML = '<i class="fa-regular fa-check"></i> Sent!';
                        setTimeout(() => {
                            if (btn.parentNode) btn.innerHTML = '<i class="fa-regular fa-bell"></i> Send Notification';
                        }, 1500);
                    }
                });
            }
        }
        
        scrollToBottom();
        return msgDiv;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    function showTypingIndicator() {
        const container = document.getElementById("messagesContainer");
        const typingDiv = document.createElement("div");
        typingDiv.id = "typingIndicator";
        typingDiv.className = "typing-indicator";
        typingDiv.innerHTML = `<span>${currentAIName}</span><div class="typing-dots"><span></span><span></span><span></span></div>`;
        container.appendChild(typingDiv);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const el = document.getElementById("typingIndicator");
        if (el) el.remove();
    }

    function scrollToBottom() {
        const container = document.getElementById("messagesContainer");
        setTimeout(() => {
            container.scrollTop = container.scrollHeight;
        }, 60);
    }

    // Send message to AI via OpenRouter
    async function sendToAI(userMessage) {
        if (isWaitingForAI) return;
        isWaitingForAI = true;
        const sendBtn = document.getElementById("sendMsgBtn");
        const inputField = document.getElementById("messageInput");
        sendBtn.classList.add("disabled");
        
        // add user message to UI and history
        addMessageToUI("user", currentUserName, userMessage);
        conversationHistory.push({ role: "user", content: userMessage });
        
        // Build system prompt respecting 200 word limit instruction + AI persona
        const systemPrompt = `You are an AI assistant named "${currentAIName}". Keep your responses helpful, warm and concise. Strictly limit your answer to under 200 words. If asked long explanations, summarize. Always reply as ${currentAIName}.`;
        
        const messagesForAPI = [
            { role: "system", content: systemPrompt },
            ...conversationHistory.slice(-10)  // keep last 10 messages for context
        ];
        
        showTypingIndicator();
        
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                    "HTTP-Referer": window.location.href,
                    "X-Title": "AI Assistant Chat"
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: messagesForAPI,
                    temperature: 0.7,
                    max_tokens: 450  // ensures around 200 words approx
                })
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API error ${response.status}: ${errorText}`);
            }
            
            const data = await response.json();
            let aiReply = data.choices?.[0]?.message?.content || "Sorry, I couldn't generate a response.";
            aiReply = enforceWordLimit(aiReply, 200);
            
            // add AI response to UI and history
            addMessageToUI("assistant", currentAIName, aiReply);
            conversationHistory.push({ role: "assistant", content: aiReply });
            
            // 🔔 CRITICAL: only AI reply triggers notification (automatic)
            if (autoNotificationPossible) {
                triggerAINotification(aiReply);
            } else {
                // auto not possible: manual button already inside AI message div
                console.log("Manual notification button available for this AI reply");
            }
            
        } catch (error) {
            console.error("AI request failed:", error);
            const errorMsg = "⚠️ AI service error. Please try again later.";
            addMessageToUI("assistant", currentAIName, errorMsg);
            conversationHistory.push({ role: "assistant", content: errorMsg });
            // no notification on error messages
        } finally {
            removeTypingIndicator();
            isWaitingForAI = false;
            sendBtn.classList.remove("disabled");
            inputField.focus();
        }
    }

    // Send button action
    function handleSendMessage() {
        if (isWaitingForAI) return;
        const inputEl = document.getElementById("messageInput");
        const msg = inputEl.value.trim();
        if (!msg) return;
        inputEl.value = "";
        sendToAI(msg);
    }

    // Initialize chat after login
    function initChat(userName, aiName) {
        currentUserName = userName;
        currentAIName = aiName;
        conversationHistory = [];
        isWaitingForAI = false;
        
        // update header
        document.getElementById("chatAiName").innerText = aiName;
        document.getElementById("chatUserNameDisplay").innerText = userName;
        
        // clear messages container
        const container = document.getElementById("messagesContainer");
        container.innerHTML = "";
        
        // optional welcome message from AI
        const welcomeText = `Hello ${userName}! I'm ${aiName}, your AI assistant. Feel free to ask me anything. 😊`;
        // add welcome message as AI response
        addMessageToUI("assistant", aiName, welcomeText);
        conversationHistory.push({ role: "assistant", content: welcomeText });
        
        // 🔔 Auto notification for welcome message? (only if auto available)
        if (autoNotificationPossible) {
            triggerAINotification(welcomeText);
        }
        // else manual button will appear for this welcome message because autoNotificationPossible false
    }
    
    // LOGIN validation & transition
    function handleLogin() {
        const userName = document.getElementById("userNameInput").value.trim();
        const aiName = document.getElementById("aiNameInput").value.trim();
        if (!userName) {
            alert("Please enter your name.");
            return;
        }
        if (!aiName) {
            alert("Please enter AI assistant name.");
            return;
        }
        if (userName.length > 25) {
            alert("Name too long, max 25 characters");
            return;
        }
        if (aiName.length > 25) {
            alert("AI name too long, max 25 characters");
            return;
        }
        // hide login, show chat
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("chatScreen").classList.remove("hidden");
        initChat(userName, aiName);
    }
    
    // Logout / go back to login screen (clear session)
    function logoutToLogin() {
        if (isWaitingForAI) {
            alert("Please wait, AI is responding...");
            return;
        }
        document.getElementById("chatScreen").classList.add("hidden");
        document.getElementById("loginPage").classList.remove("hidden");
        // Reset input fields
        document.getElementById("userNameInput").value = "";
        document.getElementById("aiNameInput").value = "";
        document.getElementById("messageInput").value = "";
        currentUserName = "";
        currentAIName = "";
        conversationHistory = [];
        // clear messages container
        const container = document.getElementById("messagesContainer");
        if (container) container.innerHTML = "";
    }
    
    // Event listeners and detection
    function bindEvents() {
        document.getElementById("continueBtn").addEventListener("click", handleLogin);
        document.getElementById("sendMsgBtn").addEventListener("click", handleSendMessage);
        const msgInput = document.getElementById("messageInput");
        msgInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !isWaitingForAI) {
                e.preventDefault();
                handleSendMessage();
            }
        });
        document.getElementById("logoutBtn").addEventListener("click", logoutToLogin);
        
        // also allow enter on login inputs
        const userNameField = document.getElementById("userNameInput");
        const aiNameField = document.getElementById("aiNameInput");
        userNameField.addEventListener("keypress", (e) => { if (e.key === "Enter") handleLogin(); });
        aiNameField.addEventListener("keypress", (e) => { if (e.key === "Enter") handleLogin(); });
    }
    
    // detect legacy player_id sync (keeping original style but no need for target)
    // But we preserve detection mechanism for AppInventor compatibility
    function monitorAppInventor() {
        // to stay consistent with old code's interval check
        setInterval(() => {
            if (window.AppInventor && window.AppInventor.getWebViewString && !autoNotificationPossible) {
                // re-evaluate capability if it appears later
                if (window.AppInventor && typeof window.AppInventor.setWebViewString === "function") {
                    autoNotificationPossible = true;
                    console.log("AppInventor bridge detected dynamically! Auto Notifications enabled.");
                    // refresh UI for existing messages? not needed but future AI replies will work.
                }
            }
        }, 2000);
    }
    
    // maintain legacy like detection and also handle existing notif system
    (function startup() {
        checkNotificationCapability();
        bindEvents();
        monitorAppInventor();
    })();
</script>
</body>
</html>
