<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSecureID Test - Single Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white p-8 rounded-lg shadow-md max-w-2xl w-full">
        
        <!-- Test Button -->
        <div id="login-section">
            <h1 class="text-2xl font-bold mb-4">Test iSecureID</h1>
            <button onclick="testLogin()" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded hover:bg-indigo-700">
                🔐 Login with iSecureID
            </button>
            <p class="text-xs text-gray-500 mt-2 font-mono" id="test-url"></p>
        </div>
        
        <!-- Result Display -->
        <div id="result-section" class="hidden">
            <h2 class="text-xl font-bold mb-4 text-green-600">✅ Login Successful!</h2>
            <div class="space-y-2 text-sm">
                <div><strong>Username:</strong> <span id="res-username"></span></div>
                <div><strong>Auth ID:</strong> <span id="res-authid"></span></div>
                <div><strong>Email:</strong> <span id="res-email"></span></div>
                <div><strong>Token:</strong> <textarea id="res-token" class="w-full h-32 font-mono text-xs bg-gray-50 p-2 rounded border mt-1"></textarea></div>
            </div>
            <button onclick="location.reload()" class="mt-4 bg-gray-200 px-4 py-2 rounded">Test Again</button>
        </div>
        
        <!-- Console Logs -->
        <div class="mt-6 bg-gray-50 p-4 rounded border">
            <h3 class="font-bold text-sm mb-2">Console Logs:</h3>
            <div id="console-logs" class="text-xs font-mono space-y-1 max-h-40 overflow-auto"></div>
        </div>
        
    </div>
    
    <script>
        const log = (msg) => {
            console.log(msg);
            const logs = document.getElementById('console-logs');
            const p = document.createElement('p');
            p.className = 'text-gray-700';
            p.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            logs.appendChild(p);
            logs.scrollTop = logs.scrollHeight;
        };
        
        function testLogin() {
            const currentUrl = window.location.href.split('?')[0];
            const callback = encodeURIComponent(currentUrl);
            const authUrl = `https://isecureid.netlify.app/?redirect_uri=${callback}`;
            
            document.getElementById('test-url').textContent = 'Callback URL: ' + currentUrl;
            log('🚀 Redirecting to iSecureID...');
            log('Callback URL: ' + currentUrl);
            
            window.location.href = authUrl;
        }
        
        // Check for callback params
        const urlParams = new URLSearchParams(window.location.search);
        
        if(urlParams.get('token')) {
            log('✅ Callback received with token');
            
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            
            document.getElementById('res-username').textContent = urlParams.get('username');
            document.getElementById('res-authid').textContent = urlParams.get('auth_id');
            document.getElementById('res-email').textContent = urlParams.get('email');
            document.getElementById('res-token').value = urlParams.get('token');
            
            log('Username: ' + urlParams.get('username'));
            log('Auth ID: ' + urlParams.get('auth_id'));
            log('Email: ' + urlParams.get('email'));
            log('Token length: ' + urlParams.get('token').length);
        } else if(urlParams.get('error')) {
            log('❌ Error: ' + urlParams.get('error'));
        } else {
            log('⏳ Ready to test');
        }
    </script>
</body>
</html>
