<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSecureID Test - Updated</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
button {
    transition: all 0.2s ease;
}
button:active {
    transform: scale(0.95);
}
</style>

</head>

<body class="bg-gradient-to-br from-indigo-100 to-gray-200 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-6 rounded-2xl shadow-xl max-w-2xl w-full">

<!-- LOGIN -->
<div id="login-section">

<h1 class="text-2xl font-bold mb-4 text-center">🔐 iSecureID OAuth Test</h1>

<!-- Web Login -->
<div class="mb-6">
<h2 class="text-lg font-semibold mb-2">🌐 Web Login</h2>

<button onclick="testWebLogin()" 
class="w-full border-2 border-indigo-600 text-indigo-600 font-bold py-3 rounded-lg hover:bg-indigo-600 hover:text-white">
Login (Web)
</button>

<p id="web-test-url" class="text-xs mt-2 font-mono"></p>
</div>

<!-- Mobile Login -->
<div class="border-t pt-6">
<h2 class="text-lg font-semibold mb-2">📱 Mobile Login</h2>

<input type="text" id="package-name-input"
value="com.duckshop.official"
class="w-full px-3 py-2 border rounded mb-3">

<button onclick="testMobileLogin()" 
class="w-full border-2 border-green-600 text-green-600 font-bold py-3 rounded-lg hover:bg-green-600 hover:text-white">
Login (Mobile)
</button>

<p id="mobile-test-url" class="text-xs mt-2 font-mono"></p>
</div>

</div>

<!-- RESULT -->
<div id="result-section" class="hidden">

<h2 class="text-xl font-bold text-green-600 mb-4">✅ Login Success</h2>

<p><b>Username:</b> <span id="res-username"></span></p>
<p><b>Auth ID:</b> <span id="res-authid"></span></p>
<p><b>Email:</b> <span id="res-email"></span></p>

<textarea id="res-token" class="w-full mt-3 p-2 border rounded h-28"></textarea>

<button onclick="copyToken()" 
class="mt-3 w-full border-2 border-indigo-600 text-indigo-600 py-2 rounded hover:bg-indigo-600 hover:text-white">
Copy Token
</button>

<button onclick="location.reload()" 
class="mt-2 w-full border py-2 rounded">
Reset
</button>

</div>

<!-- ERROR -->
<div id="error-section" class="hidden">
<h2 class="text-xl text-red-600 font-bold mb-2">❌ Failed</h2>
<p id="error-message"></p>
</div>

<!-- LOG -->
<div class="mt-6 bg-black text-green-400 p-3 rounded text-xs h-40 overflow-auto" id="console-logs"></div>

</div>

<script>

const API_KEY = "isecure_5y4rk0e9b4kheykgb58j3";

// LOG
function log(msg){
    const box = document.getElementById("console-logs");
    box.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
    box.scrollTop = box.scrollHeight;
}

// COPY TOKEN
function copyToken(){
    const token = document.getElementById("res-token").value;
    navigator.clipboard.writeText(token);
    alert("Copied!");
}

// WEB LOGIN
function testWebLogin(){

    const callback = encodeURIComponent(window.location.href.split("?")[0]);

    const url = `https://isecureid.netlify.app/?redirect_uri=${callback}&api_key=${API_KEY}`;

    document.getElementById("web-test-url").textContent = url;

    log("Redirecting Web Login...");
    setTimeout(()=> window.location.href = url, 500);
}

// MOBILE LOGIN
function testMobileLogin(){

    const packageName = document.getElementById("package-name-input").value;

    const url = `https://isecureid.netlify.app/?package_name=${packageName}&api_key=${API_KEY}`;

    document.getElementById("mobile-test-url").textContent = url;

    log("Redirecting Mobile Login...");
    setTimeout(()=> window.location.href = url, 500);
}

// HANDLE RESPONSE
window.onload = () => {

    const params = new URLSearchParams(window.location.search);

    if(params.get("token")){

        document.getElementById("login-section").style.display="none";
        document.getElementById("result-section").style.display="block";

        document.getElementById("res-username").textContent = params.get("username");
        document.getElementById("res-authid").textContent = params.get("auth_id");
        document.getElementById("res-email").textContent = params.get("email");
        document.getElementById("res-token").value = params.get("token");

        log("Login Success");

    } else if(params.get("error")){

        document.getElementById("login-section").style.display="none";
        document.getElementById("error-section").style.display="block";

        document.getElementById("error-message").textContent = params.get("error");

        log("Error: " + params.get("error"));
    } else {
        log("Ready...");
    }

}

</script>

</body>
</html>
