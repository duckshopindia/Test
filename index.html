<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatZeno Hardware Test</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; background: #f4f4f9; }
        button { width: 80%; padding: 15px; border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-gallery { background: #25D366; }
        .btn-camera { background: #34B7F1; }
        .btn-mic { background: #E91E63; }
        #status { margin-top: 10px; color: #555; font-size: 14px; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>

    <h2>ChatZeno Test Lab</h2>

    <button class="btn-gallery" onclick="openGallery()">1. Open Gallery</button>

    <button class="btn-camera" onclick="openCamera()">2. Open Camera</button>

    <button class="btn-mic" id="micBtn">3. Record Voice (Hold)</button>

    <div id="status">Wait for signal...</div>

    <script>
        const statusDiv = document.getElementById('status');

        // 1. Gallery Signal
        function openGallery() {
            console.log("OPEN_GALLERY");
            statusDiv.innerText = "Signal: OPEN_GALLERY sent to App";
        }

        // 2. Camera Access (CustomWebView will handle GrantPermission)
        async function openCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                statusDiv.innerText = "Camera Access: SUCCESS";
                // Stream handle karne ke liye video tag lagaya ja sakta hai
            } catch (err) {
                statusDiv.innerText = "Camera Error: " + err.message;
            }
        }

        // 3. Microphone Recording Test
        let mediaRecorder;
        let audioChunks = [];
        const micBtn = document.getElementById('micBtn');

        micBtn.onmousedown = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                statusDiv.innerText = "Recording started...";
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
            } catch (err) {
                statusDiv.innerText = "Mic Error: " + err.message;
            }
        };

        micBtn.onmouseup = () => {
            if(mediaRecorder) {
                mediaRecorder.stop();
                statusDiv.innerText = "Recording stopped and saved in memory.";
                // Yahan audio save ya play karne ka logic add ho sakta hai
            }
        };

        // App se photo wapas lene ka function (Jo aapne AfterPicking mein set kiya hai)
        function setImageFromApp(path) {
            statusDiv.innerText = "Photo Received from App: " + path;
        }
    </script>

</body>
</html>
